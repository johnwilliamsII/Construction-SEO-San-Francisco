# FTP deploy workflow — DISABLED.
# Hostinger runs this repo as a Node.js Web App with its own Git auto-deployment.
# That pipeline (hPanel → Git → auto-build → npm start) is the single source of truth.
# This file is kept for reference but will never trigger (no valid `on:` trigger).
#
# To re-enable FTP static export in the future:
#   1. Set output: 'export' back in next.config.js
#   2. Add FTP_SERVER / FTP_USERNAME / FTP_PASSWORD to GitHub repo secrets
#   3. Restore the `on: push: branches: [main]` trigger below

name: Build & Deploy to Hostinger (DISABLED)

on:
  workflow_dispatch:     # manual trigger only — never fires on push

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          local-dir:  ./out/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
